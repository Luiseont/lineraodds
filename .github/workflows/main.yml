name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: luiseont/lineraodds

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
      oracle: ${{ steps.filter.outputs.oracle }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'service/**'
              - 'contracts/**'
            oracle:
              - 'oracle/**'
            front:
              - 'front/**'

  build-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push service
        uses: docker/build-push-action@v5
        with:
          context: ./service
          file: ./service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-service:buildcache,mode=max

  build-oracle:
    needs: detect-changes
    if: needs.detect-changes.outputs.oracle == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push oracle
        uses: docker/build-push-action@v5
        with:
          context: ./oracle
          file: ./oracle/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/luiseont/lineraodds-oracle:latest
            ${{ env.REGISTRY }}/luiseont/lineraodds-oracle:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/luiseont/lineraodds-oracle:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/luiseont/lineraodds-oracle:buildcache,mode=max

  build-front:
    needs: detect-changes
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push front
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/luiseont/lineraodds-front:latest
            ${{ env.REGISTRY }}/luiseont/lineraodds-front:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/luiseont/lineraodds-front:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/luiseont/lineraodds-front:buildcache,mode=max

  deploy:
    needs: [detect-changes, build-service, build-oracle, build-front]
    if: always() && (needs.build-service.result == 'success' || needs.build-oracle.result == 'success' || needs.build-front.result == 'success')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='dist' --exclude='*.log'
          path: ./
          remote_path: /home/main/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USERNAME }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: ${{ secrets.VPS_PORT || 22 }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_KEY: ${{ secrets.API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: API_KEY,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            cd /home/main
            bash scripts/deploy.bash

      - name: Deployment summary
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Frontend: https://lineraodds.bet"
          echo "🔌 API: https://api.lineraodds.bet"
          echo "📊 Oracle: https://oracle.lineraodds.bet/status"
