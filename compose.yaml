services:
  service:
    build: ./service

    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./service:/build/service
      - ./contracts:/build/contracts
      - ./common:/common:ro
      - shared-env:/shared
    entrypoint: ["bash", "/build/service/run.bash"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1200s

  front:
    build: ./front
    volumes:
      - ./front:/front
      - ./common:/common:ro
      - shared-env:/shared
    depends_on:
      service:
        condition: service_healthy

  oracle:
    build: ./oracle
    ports:
      - "127.0.0.1:9999:9999"
      - "127.0.0.1:8090:8090"
    volumes:
      - ./oracle:/oracle
      - ./common:/common:ro
      - shared-env:/shared
    environment:
      - LINERA_FAUCET=https://faucet.testnet-conway.linera.net
      - SERVICE_URL=http://localhost:8090
      - API=https://v3.football.api-sports.io
      - API_KEY=${API_KEY}
      - DEMO_MODE=true
      - LEADERBOARD_ENABLED=true
      - LEADERBOARD_PRIZE_POOL=10000
    restart: unless-stopped
    entrypoint: ["bash", "/oracle/start.bash"]
    depends_on:
      service:
        condition: service_healthy

volumes:
  shared-env:
